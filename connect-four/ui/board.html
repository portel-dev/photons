<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect Four</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #0f172a;
        --board: #1e40af;
        --board-border: #1d4ed8;
        --empty: #1e293b;
        --player: #ef4444;
        --player-glow: #dc2626;
        --ai: #eab308;
        --ai-glow: #ca8a04;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --accent: #3b82f6;
        --win: #22c55e;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .header {
        text-align: center;
        margin-bottom: 16px;
      }
      .header h1 {
        font-size: 22px;
        font-weight: 700;
      }
      .how-to-play {
        font-size: 13px;
        color: var(--muted);
        margin: 6px 0 4px;
        line-height: 1.5;
        max-width: 380px;
      }
      .status {
        font-size: 15px;
        color: var(--muted);
        margin-top: 6px;
        min-height: 22px;
      }
      .status.your-turn {
        color: var(--player);
        font-weight: 500;
      }
      .status.ai-turn {
        color: var(--ai);
        font-weight: 500;
      }
      .status.win {
        color: var(--win);
        font-weight: 600;
        font-size: 18px;
      }
      .status.loss {
        color: var(--player);
        font-weight: 500;
      }

      /* Column drop buttons */
      .drop-buttons {
        display: grid;
        grid-template-columns: repeat(7, 48px);
        gap: 4px;
        margin-bottom: 4px;
      }
      .drop-btn {
        height: 32px;
        background: transparent;
        border: 2px solid transparent;
        border-radius: 8px;
        color: var(--muted);
        font-size: 18px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .drop-btn:hover:not(:disabled) {
        background: rgba(59, 130, 246, 0.15);
        border-color: var(--accent);
        color: var(--text);
      }
      .drop-btn:disabled {
        cursor: default;
        opacity: 0.3;
      }

      /* Board */
      .board {
        background: var(--board);
        border: 3px solid var(--board-border);
        border-radius: 12px;
        padding: 8px;
        display: grid;
        grid-template-columns: repeat(7, 48px);
        grid-template-rows: repeat(6, 48px);
        gap: 4px;
      }
      .cell {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--empty);
        /* No transition — animation handles new pieces */
      }
      .cell.player {
        background: var(--player);
        box-shadow:
          0 0 8px var(--player-glow),
          inset 0 -2px 4px rgba(0, 0, 0, 0.3);
      }
      .cell.ai {
        background: var(--ai);
        box-shadow:
          0 0 8px var(--ai-glow),
          inset 0 -2px 4px rgba(0, 0, 0, 0.3);
      }
      .cell.winning {
        animation: pulse 0.6s ease-in-out infinite alternate;
        z-index: 1;
      }
      @keyframes pulse {
        from {
          transform: scale(1);
          filter: brightness(1);
        }
        to {
          transform: scale(1.12);
          filter: brightness(1.3);
        }
      }

      /* Victory */
      .victory-overlay {
        display: none;
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
      }
      .victory-overlay.active {
        display: block;
      }
      .confetti {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 2px;
        opacity: 0;
      }
      @keyframes confetti-fall {
        0% {
          transform: translateY(-10px) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0;
        }
      }
      .victory-banner {
        display: none;
        text-align: center;
        margin-top: 12px;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        animation: banner-in 0.4s ease-out;
      }
      .victory-banner.win {
        display: block;
        background: linear-gradient(
          135deg,
          rgba(34, 197, 94, 0.15),
          rgba(34, 197, 94, 0.05)
        );
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: var(--win);
      }
      .victory-banner.loss {
        display: block;
        background: linear-gradient(
          135deg,
          rgba(234, 179, 8, 0.15),
          rgba(234, 179, 8, 0.05)
        );
        border: 1px solid rgba(234, 179, 8, 0.3);
        color: var(--ai);
      }
      .victory-banner.draw {
        display: block;
        background: linear-gradient(
          135deg,
          rgba(148, 163, 184, 0.15),
          rgba(148, 163, 184, 0.05)
        );
        border: 1px solid rgba(148, 163, 184, 0.3);
        color: var(--muted);
      }
      @keyframes banner-in {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* AI comment */
      .ai-comment {
        margin-top: 14px;
        padding: 10px 16px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        font-size: 14px;
        color: var(--muted);
        font-style: italic;
        max-width: 360px;
        text-align: center;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ai-comment:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Connect Four</h1>
      <div class="how-to-play">
        Connect <strong>4 in a row</strong> — horizontal, vertical, or
        diagonal.<br />
        <span style="color: var(--player)">Red</span> = You,
        <span style="color: var(--ai)">Yellow</span> = Opponent.
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="drop-buttons" id="drop-buttons" style="display: none">
      <button class="drop-btn" data-col="1">&#x25BC;</button>
      <button class="drop-btn" data-col="2">&#x25BC;</button>
      <button class="drop-btn" data-col="3">&#x25BC;</button>
      <button class="drop-btn" data-col="4">&#x25BC;</button>
      <button class="drop-btn" data-col="5">&#x25BC;</button>
      <button class="drop-btn" data-col="6">&#x25BC;</button>
      <button class="drop-btn" data-col="7">&#x25BC;</button>
    </div>

    <div class="board" id="board" style="display: none"></div>

    <div class="victory-banner" id="victory-banner"></div>
    <div class="ai-comment" id="ai-comment"></div>
    <div class="victory-overlay" id="victory-overlay"></div>

    <script>
      // ── State ──────────────────────────────────────────────────────
      var currentGameId = null;
      var gameActive = false;
      var busy = false;
      var opponentMode = "builtin";
      var previousBoardData = null;
      var waitingForMcp = false;
      var pollTimer = null;

      // ── Elements ──────────────────────────────────────────────────
      var boardEl = document.getElementById("board");
      var statusEl = document.getElementById("status");
      var commentEl = document.getElementById("ai-comment");
      var dropBtnsEl = document.getElementById("drop-buttons");
      var victoryBannerEl = document.getElementById("victory-banner");
      var victoryOverlayEl = document.getElementById("victory-overlay");

      // ── Helpers ───────────────────────────────────────────────────
      function parseMCPResult(raw) {
        if (raw && raw.content && Array.isArray(raw.content)) {
          var t = raw.content.find(function (c) {
            return c.type === "text" && c.text;
          });
          if (t) {
            try {
              return JSON.parse(t.text);
            } catch (e) {
              return raw;
            }
          }
        }
        return raw;
      }

      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = "status" + (cls ? " " + cls : "");
      }

      function setDropButtons(enabled) {
        dropBtnsEl.style.display = gameActive ? "grid" : "none";
        var btns = dropBtnsEl.querySelectorAll(".drop-btn");
        for (var i = 0; i < btns.length; i++) btns[i].disabled = !enabled;
      }

      // ── Board rendering ──────────────────────────────────────────
      function renderBoard(bd) {
        boardEl.style.display = "grid";
        boardEl.innerHTML = "";
        for (var r = 0; r < 6; r++) {
          for (var c = 0; c < 7; c++) {
            var cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.row = r;
            cell.dataset.col = c;
            if (bd[r][c] === 1) cell.classList.add("player");
            else if (bd[r][c] === 2) cell.classList.add("ai");
            boardEl.appendChild(cell);
          }
        }
      }

      // Render board but leave one cell empty (for staged reveal)
      function renderBoardMasked(bd, mR, mC) {
        boardEl.style.display = "grid";
        boardEl.innerHTML = "";
        for (var r = 0; r < 6; r++) {
          for (var c = 0; c < 7; c++) {
            var cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.row = r;
            cell.dataset.col = c;
            if (r === mR && c === mC) {
              /* masked */
            } else if (bd[r][c] === 1) cell.classList.add("player");
            else if (bd[r][c] === 2) cell.classList.add("ai");
            boardEl.appendChild(cell);
          }
        }
      }

      // ── Drop animation ───────────────────────────────────────────
      // Compare boards to find exactly which cell is new
      function findNewPiece(bd, piece) {
        for (var r = 0; r < 6; r++) {
          for (var c = 0; c < 7; c++) {
            if (
              bd[r][c] === piece &&
              (!previousBoardData || previousBoardData[r][c] === 0)
            ) {
              return { row: r, col: c };
            }
          }
        }
        return null;
      }

      function animateDrop(row, col) {
        var cell = boardEl.querySelector(
          '[data-row="' + row + '"][data-col="' + col + '"]',
        );
        if (!cell) return Promise.resolve();
        var dist = (row + 1) * 52; // 48px cell + 4px gap per row
        var dur = 120 + row * 60; // ms — longer fall = longer duration

        cell.style.transform = "translateY(-" + dist + "px)";
        cell.style.opacity = "0.2";

        return new Promise(function (resolve) {
          requestAnimationFrame(function () {
            var anim = cell.animate(
              [
                { transform: "translateY(-" + dist + "px)", opacity: 0.2 },
                { transform: "translateY(0)", opacity: 1 },
              ],
              {
                duration: dur,
                easing: "cubic-bezier(0.4, 0, 1, 1)", // pure acceleration, no bounce
                fill: "both",
              },
            );
            anim.onfinish = function () {
              // Clean up — remove animation so it doesn't interfere later
              anim.cancel();
              cell.style.transform = "";
              cell.style.opacity = "";
              resolve();
            };
          });
        });
      }

      // Reveal a masked cell then animate it dropping in
      function revealAndAnimate(bd, row, col) {
        var cell = boardEl.querySelector(
          '[data-row="' + row + '"][data-col="' + col + '"]',
        );
        if (!cell) return Promise.resolve();
        if (bd[row][col] === 1) cell.classList.add("player");
        else if (bd[row][col] === 2) cell.classList.add("ai");
        return animateDrop(row, col);
      }

      function cloneBoardData(bd) {
        return bd.map(function (r) {
          return r.slice();
        });
      }

      // ── Victory ──────────────────────────────────────────────────
      function findWinCells(bd, p) {
        var res = [];
        var dirs = [
          [0, 1],
          [1, 0],
          [1, 1],
          [1, -1],
        ]; // horiz, vert, diag-down, diag-up
        for (var r = 0; r < 6; r++) {
          for (var c = 0; c < 7; c++) {
            if (bd[r][c] !== p) continue;
            for (var d = 0; d < dirs.length; d++) {
              var dr = dirs[d][0],
                dc = dirs[d][1];
              var ok = true;
              for (var i = 1; i < 4; i++) {
                var nr = r + dr * i,
                  nc = c + dc * i;
                if (
                  nr < 0 ||
                  nr >= 6 ||
                  nc < 0 ||
                  nc >= 7 ||
                  bd[nr][nc] !== p
                ) {
                  ok = false;
                  break;
                }
              }
              if (ok) {
                for (var i = 0; i < 4; i++) res.push([r + dr * i, c + dc * i]);
              }
            }
          }
        }
        return res;
      }

      function highlightWin(bd, piece) {
        var cells = findWinCells(bd, piece);
        for (var i = 0; i < cells.length; i++) {
          var el = boardEl.querySelector(
            '[data-row="' + cells[i][0] + '"][data-col="' + cells[i][1] + '"]',
          );
          if (el) el.classList.add("winning");
        }
      }

      function showConfetti() {
        victoryOverlayEl.innerHTML = "";
        victoryOverlayEl.classList.add("active");
        var colors = [
          "#ef4444",
          "#eab308",
          "#22c55e",
          "#3b82f6",
          "#a855f7",
          "#f97316",
          "#ec4899",
        ];
        for (var i = 0; i < 60; i++) {
          var p = document.createElement("div");
          p.className = "confetti";
          p.style.left = Math.random() * 100 + "%";
          p.style.top = "-10px";
          p.style.background =
            colors[Math.floor(Math.random() * colors.length)];
          p.style.width = 4 + Math.random() * 6 + "px";
          p.style.height = 4 + Math.random() * 6 + "px";
          p.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
          p.style.animation =
            "confetti-fall " +
            (1.5 + Math.random() * 2) +
            "s linear " +
            Math.random() * 0.5 +
            "s forwards";
          victoryOverlayEl.appendChild(p);
        }
        setTimeout(function () {
          victoryOverlayEl.classList.remove("active");
          victoryOverlayEl.innerHTML = "";
        }, 4000);
      }

      function clearVictory() {
        victoryBannerEl.className = "victory-banner";
        victoryBannerEl.textContent = "";
        victoryOverlayEl.classList.remove("active");
        victoryOverlayEl.innerHTML = "";
      }

      function handleVictory(bd, winner) {
        gameActive = false;
        setDropButtons(false);
        highlightWin(bd, winner === "player" ? 1 : 2);
        if (winner === "player") {
          setStatus("You win!", "win");
          victoryBannerEl.className = "victory-banner win";
          victoryBannerEl.textContent = "Congratulations — you connected four!";
          showConfetti();
        } else {
          setStatus("Opponent wins!", "loss");
          victoryBannerEl.className = "victory-banner loss";
          victoryBannerEl.textContent =
            "Opponent connected four. Better luck next time!";
        }
      }

      function handleDraw() {
        gameActive = false;
        setDropButtons(false);
        setStatus("Draw — board is full!", "");
        victoryBannerEl.className = "victory-banner draw";
        victoryBannerEl.textContent = "Draw! The board is completely full.";
      }

      // ── MCP mode: poll for opponent's move ───────────────────────
      function startPolling() {
        waitingForMcp = true;
        setStatus("Waiting for AI assistant to move...", "ai-turn");
        setDropButtons(false);
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(function () {
          if (!waitingForMcp || !currentGameId) {
            clearInterval(pollTimer);
            return;
          }
          window.photon
            .callTool("board", { gameId: currentGameId })
            .then(function (raw) {
              var result = parseMCPResult(raw);
              if (!result || !result.boardData) return;
              if (
                result.currentTurn !== "player" &&
                result.status &&
                result.status.indexOf("player") === -1 &&
                !result.status.match(/won|wins|Draw/)
              )
                return;

              // Opponent moved or game ended
              clearInterval(pollTimer);
              waitingForMcp = false;
              var bd = result.boardData;
              var aiPiece = findNewPiece(bd, 2);
              if (aiPiece) {
                renderBoardMasked(bd, aiPiece.row, aiPiece.col);
                revealAndAnimate(bd, aiPiece.row, aiPiece.col).then(
                  function () {
                    afterPoll(bd, result);
                  },
                );
              } else {
                renderBoard(bd);
                afterPoll(bd, result);
              }
            })
            .catch(function () {
              /* retry on next interval */
            });
        }, 1500);
      }

      function afterPoll(bd, result) {
        previousBoardData = cloneBoardData(bd);
        var s = result.status || "";
        if (s.match(/won|wins/i)) {
          if (s.indexOf("You") >= 0 || s.indexOf("Player") >= 0)
            handleVictory(bd, "player");
          else handleVictory(bd, "ai");
        } else if (s.indexOf("Draw") >= 0) {
          handleDraw();
        } else {
          gameActive = true;
          setStatus("Your turn — drop a piece!", "your-turn");
          setDropButtons(true);
        }
      }

      // ── Drop piece handler ───────────────────────────────────────
      dropBtnsEl.addEventListener("click", function (e) {
        var btn = e.target.closest(".drop-btn");
        if (!btn || btn.disabled || busy || !gameActive) return;

        var col = parseInt(btn.dataset.col);
        busy = true;
        setDropButtons(false);
        setStatus("Dropping...", "");
        clearVictory();

        window.photon
          .callTool("drop", { column: col, gameId: currentGameId })
          .then(function (raw) {
            var result = parseMCPResult(raw);
            var bd = result.boardData;
            if (!bd) {
              setStatus("Error: no board data", "");
              busy = false;
              return;
            }

            if (opponentMode === "builtin" && result.aiMove) {
              // ── Builtin: staged render ──
              var aiCol0 = result.aiMove - 1;
              // Find AI's new piece row
              var aiRow = -1;
              for (var r = 0; r < 6; r++) {
                if (
                  bd[r][aiCol0] === 2 &&
                  (!previousBoardData || previousBoardData[r][aiCol0] === 0)
                ) {
                  aiRow = r;
                  break;
                }
              }

              // Stage 1: render board with player piece, mask AI piece
              if (aiRow >= 0) renderBoardMasked(bd, aiRow, aiCol0);
              else renderBoard(bd);

              var pp = findNewPiece(bd, 1);
              var step1 = pp ? animateDrop(pp.row, pp.col) : Promise.resolve();

              step1
                .then(function () {
                  if (aiRow < 0) return Promise.resolve();
                  // Stage 2: pause, then reveal AI piece
                  setStatus("Opponent is thinking...", "ai-turn");
                  return new Promise(function (res) {
                    setTimeout(res, 700);
                  }).then(function () {
                    return revealAndAnimate(bd, aiRow, aiCol0);
                  });
                })
                .then(function () {
                  previousBoardData = cloneBoardData(bd);
                  finishDrop(bd, result);
                  busy = false;
                });
            } else {
              // ── MCP mode or no AI move ──
              renderBoard(bd);
              var pp = findNewPiece(bd, 1);
              var step = pp ? animateDrop(pp.row, pp.col) : Promise.resolve();
              step.then(function () {
                previousBoardData = cloneBoardData(bd);
                finishDrop(bd, result);
                busy = false;
              });
            }
          })
          .catch(function (err) {
            setStatus("Error: " + err.message, "");
            setDropButtons(true);
            busy = false;
          });
      });

      function finishDrop(bd, result) {
        commentEl.textContent = result.aiComment || "";
        if (result.winner === "player") {
          handleVictory(bd, "player");
        } else if (result.winner === "ai") {
          handleVictory(bd, "ai");
        } else if (result.status === "Draw!") {
          handleDraw();
        } else if (opponentMode === "mcp") {
          startPolling();
        } else {
          setStatus("Your turn — drop a piece!", "your-turn");
          setDropButtons(true);
        }
      }

      // ── onResult: Beam delivers tool result, we render it ────────
      if (window.photon) {
        window.photon.onResult(function (raw) {
          var result = parseMCPResult(raw);
          if (!result || !result.boardData) return;

          clearVictory();
          currentGameId = result.gameId;
          opponentMode = result.opponentMode || "builtin";
          previousBoardData = cloneBoardData(result.boardData);
          renderBoard(result.boardData);

          // Determine game state from result
          if (result.winner) {
            handleVictory(result.boardData, result.winner);
          } else if (result.status === "Draw!") {
            handleDraw();
          } else {
            // Active game
            gameActive = true;
            var isPlayerTurn =
              result.status === "Your turn" ||
              result.currentTurn === "player" ||
              (!result.status && !!result.gameId); // newGame result has no status

            if (isPlayerTurn) {
              setStatus("Your turn — drop a piece!", "your-turn");
              setDropButtons(true);
            } else {
              // It's opponent's turn — in MCP mode, poll
              if (opponentMode === "mcp") {
                startPolling();
              } else {
                setStatus("Opponent's turn...", "ai-turn");
                setDropButtons(false);
              }
            }
          }

          commentEl.textContent = result.aiComment || result.message || "";
        });
      }
    </script>
  </body>
</html>
